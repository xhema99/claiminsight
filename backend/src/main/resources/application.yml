server:
  port: 8080

spring:
  application:
    name: claiminsight
  datasource:
    url: jdbc:h2:mem:claiminsight
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

jwt:
  secret: ClaimInsightSecretKey2024MustBeAtLeast256BitsLongForHS256Algorithm!!
  expiration: 86400000

groq:
  api-key: ${GROQ_API_KEY:sk-placeholder}
  model: llama3-70b-8192
